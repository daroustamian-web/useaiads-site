<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Your Free Consultation — UseAIAds</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #141418;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      margin-bottom: 1.5rem;
      object-fit: cover;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #9ca3af;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #2a2a30;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .redirect-text {
      color: #6b7280;
      font-size: 0.85rem;
    }
    .redirect-text a {
      color: #3b82f6;
      text-decoration: none;
    }
    .redirect-text a:hover {
      text-decoration: underline;
    }
    .error {
      display: none;
      background: #1e1e24;
      border: 1px solid #2a2a30;
      border-radius: 12px;
      padding: 2rem;
    }
    .error h2 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
    }
    .error p {
      color: #9ca3af;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .error a {
      display: inline-block;
      background: #3b82f6;
      color: #fff;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Loading state (shown while fetching agency config) -->
    <div id="loading">
      <div id="agency-logo-wrap" style="display:none;">
        <img id="agency-logo" class="logo" src="" alt="" />
      </div>
      <h1 id="agency-name">Connecting you to your consultation...</h1>
      <p class="subtitle" id="agency-location"></p>
      <div class="spinner"></div>
      <p class="redirect-text">Redirecting to booking page... <a id="manual-link" href="#">Click here if not redirected</a></p>
    </div>

    <!-- Error state (agency not found) -->
    <div id="error" class="error">
      <h2>Agency Not Found</h2>
      <p>The booking link you followed doesn't match any of our partner agencies. Please check the link and try again.</p>
      <a href="/senior-care.html">Learn About Our Service</a>
    </div>
  </div>

  <script>
    (async function() {
      // Get agency slug from URL path: /book/agency-slug
      const path = window.location.pathname;
      const slug = path.replace(/^\/book\/?/, '').replace(/\/$/, '').toLowerCase();

      if (!slug) {
        showError();
        return;
      }

      try {
        const res = await fetch('/agencies.json');
        const agencies = await res.json();
        const agency = agencies[slug];

        if (!agency || !agency.active || !agency.bookingUrl || agency.bookingUrl.includes('CALENDAR_ID_HERE')) {
          showError();
          return;
        }

        // Show agency branding
        document.getElementById('agency-name').textContent = agency.name;
        if (agency.city && agency.state) {
          document.getElementById('agency-location').textContent = `${agency.city}, ${agency.state}`;
        }
        if (agency.logo) {
          const img = document.getElementById('agency-logo');
          img.src = agency.logo;
          img.alt = agency.name;
          document.getElementById('agency-logo-wrap').style.display = 'block';
        }
        document.getElementById('manual-link').href = agency.bookingUrl;

        // Track the redirect event (Meta Pixel if present)
        if (typeof fbq === 'function') {
          fbq('trackCustom', 'BookingRedirect', { agency: slug });
        }

        // Redirect after brief delay (lets branding display)
        setTimeout(function() {
          window.location.href = agency.bookingUrl;
        }, 1500);

      } catch (e) {
        showError();
      }

      function showError() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
      }
    })();
  </script>
</body>
</html>
